<div class="login-page">
  <div class="login-card">
    <h1>🍛 SpiceHouse</h1>
    <h2>Admin Login</h2>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <input
      [(ngModel)]="username"
      type="text"
      placeholder="Username"
    />
    <input
      [(ngModel)]="password"
      type="password"
      placeholder="Password"
    />
    <button (click)="login()">Login</button>

    <p class="hint">Username: <b>admin</b> | Password: <b>admin123</b></p>
  </div>
</div>
